<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - InstaRocket</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Inter;">
  
  <div style="background:rgba(255,255,255,0.95); padding:3rem; border-radius:24px; width:100%; max-width:420px; box-shadow:0 25px 50px rgba(0,0,0,0.15);">
    
    <div style="text-align:center; margin-bottom:2rem;">
      <h2 style="color:#1f2937; font-size:2rem; font-weight:800; margin-bottom:0.5rem;">InstaRocket</h2>
      <p style="color:#6b7280;">Join 25K+ creators automating Instagram growth</p>
    </div>
    
    <form id="authForm">
      <input type="text" id="name" placeholder="Full Name" required 
             style="width:100%; padding:16px; margin:8px 0; border:2px solid #e5e7eb; border-radius:12px; font-size:16px;">
      <input type="email" id="email" placeholder="Email Address" required 
             style="width:100%; padding:16px; margin:8px 0; border:2px solid #e5e7eb; border-radius:12px; font-size:16px;">
      <input type="password" id="password" placeholder="Password (6+ chars)" required minlength="6"
             style="width:100%; padding:16px; margin:8px 0; border:2px solid #e5e7eb; border-radius:12px; font-size:16px;">
      
      <button type="submit" style="
        width:100%; padding:16px; background:linear-gradient(45deg,#4F46E5,#7C3AED); 
        color:white; border:none; border-radius:12px; font-size:16px; font-weight:600; 
        cursor:pointer; margin:16px 0; transition:all 0.3s;">
        Create Account Free
      </button>
    </form>
    
    <div style="text-align:center; margin:2rem 0; color:#6b7280;">or</div>
    
    <button onclick="connectInstagram()" style="
      width:100%; padding:16px; background:linear-gradient(45deg,#E4405F,#F77737); 
      color:white; border:none; border-radius:12px; font-size:16px; font-weight:600; 
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px;">
      <i class="fab fa-instagram"></i>
      Continue with Instagram
    </button>
    
    <p style="text-align:center; margin-top:2rem; color:#6b7280;">
      Already have account? <a href="#" onclick="toggleLogin()" style="color:#4F46E5; font-weight:600;">Login</a>
    </p>
  </div>

  <script>
    let isLogin = false;
    
    function toggleLogin() {
      isLogin = !isLogin;
      document.getElementById('name').style.display = isLogin ? 'none' : 'block';
      document.getElementById('authForm').onsubmit = isLogin ? loginUser : registerUser;
    }
    
    async function registerUser(e) {
      e.preventDefault();
      await authUser('register');
    }
    
    async function loginUser(e) {
      e.preventDefault();
      await authUser('login');
    }
    
    async function authUser(type) {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value || 'User';
      
      try {
        const endpoint = type === 'register' ? '/api/register' : '/api/login';
        const body = type === 'register' ? 
          { email, password, name } : 
          { email, password };
        
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        const data = await res.json();
        console.log(`${type} response:`, data);
        
        if (data.token) {
          localStorage.setItem('token', data.token);
          alert(`✅ ${type === 'register' ? 'Account created!' : 'Welcome back!'} Redirecting...`);
          window.location.href = '/dashboard.html';
        } else {
          alert(`❌ ${data.error || 'Something went wrong'}`);
        }
      } catch (err) {
        console.error('Network error:', err);
        alert('❌ Network error - Check console (F12)');
      }
    }
    
    function connectInstagram() {
      alert('🚀 Instagram Connect Coming Soon!\n\nFor now use Email signup 😊');
    }
    
    // Auto focus
    document.getElementById('name')?.focus();
  </script>
</body>
</html>
